interface:
  display_name: "ACP Subagent Orchestrator"
  short_description: "Natural language-driven ACP subagent orchestration: Agent autonomously handles setup, permission confirmation, and delegation execution."
  default_prompt: "When the user asks to configure a subagent, communicate with the user in natural language only. The Agent autonomously invokes setup.py to display the runner catalog, install runners in isolation, probe connectivity, and persist permission selections. Subsequent delegation follows critical-path and sidecar rules, executing bounded delegations via ACP."
